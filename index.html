<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme CRM | Atendimento Premium</title>
    <link rel="stylesheet" href="style.css"> <!-- O seu CSS atual -->
    <link rel="stylesheet" href="crm.css">   <!-- O CSS extra do chat abaixo -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="crm-body">

    <!-- Navbar Superior -->
    <header class="crm-navbar">
        <div class="logo-area">
            <img src="https://via.placeholder.com/40?text=S" alt="Supreme Logo" class="logo-crm">
            <span>Supreme CRM</span>
        </div>
        <div class="user-status">
            <span class="status-dot online"></span>
            <span class="agent-name">Operador Principal</span>
        </div>
    </header>

    <div class="crm-container">
        
        <!-- COLUNA 1: Lista de Conversas -->
        <aside class="chat-list-column">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Buscar cliente ou número...">
            </div>
            
            <div class="inbox-filter">
                <button class="filter-btn active">Abertos</button>
                <button class="filter-btn">Aguardando</button>
                <button class="filter-btn">Resolvidos</button>
            </div>

            <div class="conversations-list" id="chat-list">
                <!-- Injetado via JS -->
            </div>
        </aside>

        <!-- COLUNA 2: Área de Mensagens -->
        <main class="chat-window-column">
            
            <!-- Header do Chat -->
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="avatar"><i class="fas fa-user"></i></div>
                    <div>
                        <h3 id="current-chat-name">Selecione uma conversa</h3>
                        <p id="current-chat-phone">---</p>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="btn-icon" title="Encerrar Atendimento"><i class="fas fa-check-circle"></i></button>
                </div>
            </div>

            <!-- Histórico de Mensagens -->
            <div class="chat-history" id="chat-history">
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <p>Nenhuma conversa selecionada</p>
                </div>
            </div>

            <!-- Input de Mensagem -->
            <div class="chat-input-area">
                <button class="btn-attach"><i class="fas fa-paperclip"></i></button>
                <textarea id="msg-input" placeholder="Digite sua mensagem (Use Shift+Enter para pular linha)..."></textarea>
                <button class="btn-send" onclick="enviarMensagem()"><i class="fas fa-paper-plane"></i></button>
            </div>

        </main>

        <!-- COLUNA 3: Ficha CRM (Informações do Cliente) -->
        <aside class="crm-details-column">
            <div class="crm-section">
                <h3>Detalhes do Lead</h3>
                <div class="crm-field">
                    <label>Nome</label>
                    <input type="text" id="crm-name" class="form-control-sm" readonly>
                </div>
                <div class="crm-field">
                    <label>Telefone</label>
                    <input type="text" id="crm-phone" class="form-control-sm" readonly>
                </div>
            </div>

            <div class="crm-section">
                <h3>Etiquetas (Chatwoot)</h3>
                <div class="tags-container" id="crm-tags">
                    <!-- Etiquetas renderizadas aqui -->
                </div>
                <button class="btn-add-tag"><i class="fas fa-plus"></i> Adicionar Etiqueta</button>
            </div>

            <div class="crm-section">
                <h3>Anotações Internas</h3>
                <textarea class="form-control-sm" placeholder="Anotações visíveis apenas para a equipe..."></textarea>
                <button class="btn-save-note">Salvar Nota</button>
            </div>
        </aside>

    </div>

    <script src="crm.js"></script>
</body>
</html>
